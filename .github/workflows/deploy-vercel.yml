name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug: check VERCEL_TOKEN
        run: |
          echo "Checking VERCEL_TOKEN availability"
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is EMPTY or not set"
            exit 1
          else
            echo "VERCEL_TOKEN is set"
          fi

      - name: Deploy to Vercel (CLI)
        run: |
          echo "Installing dev dependencies and running vercel CLI"
          npm ci --no-audit --no-fund
          npx --yes vercel --token "${{ secrets.VERCEL_TOKEN }}" --prod --confirm
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
